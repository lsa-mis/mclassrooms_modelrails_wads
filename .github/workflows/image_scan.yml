name: Image Scan

# Scans the production image for OS-package CVEs (glibc, openssl, sqlite3,
# libvips in the ruby:slim base) — the layer brakeman (app code) and
# bundler-audit (gem deps) cannot see.
#
# Policy: runs on Dockerfile-affecting PRs plus a weekly schedule, NOT on
# every PR. New base-image CVEs appear without any code change; gating every
# PR on them would red-flag unrelated green branches (the same drift mode as
# the 2026-06-09 bundler-audit oauth2 CVE on a no-change branch). The weekly
# run surfaces those independently of development activity.
#
# Exceptions: to accept a finding temporarily, add the CVE ID to a
# .trivyignore file at the repo root with a comment explaining why and a
# revisit date. Trivy picks the file up automatically.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "Gemfile.lock"
      - ".trivyignore"
      - ".github/workflows/image_scan.yml"
  workflow_dispatch:

jobs:
  scan_image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Reuses the GHA layer cache that ci.yml's docker_build job populates
      # (mode=max), so this is normally a cache replay, not a cold build.
      # load: true exports the image into the local Docker daemon — without
      # it the image exists only in the build cache and Trivy has nothing
      # to scan.
      # no-cache on scheduled runs: a cached apt layer answers "what did we
      # build last time", not "what would we ship if we rebuilt today" — the
      # first scan flagged OpenSSL/poppler packages Debian had already fixed,
      # hidden behind a stale cached layer.
      - name: Build production image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          no-cache: ${{ github.event_name == 'schedule' }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: modelrails_base:scan-${{ github.sha }}

      # ignore-unfixed: Debian-stable bases always carry CVEs with no fixed
      # package yet; gating on them would make this permanently red and
      # trained-away. The gate is "a fix exists and we haven't taken it".
      - name: Scan for HIGH/CRITICAL CVEs with a fix available
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: modelrails_base:scan-${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
