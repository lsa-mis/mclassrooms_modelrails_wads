name: CI

on:
  pull_request:
  push:
    branches: [ main ]

# A new push to a PR branch supersedes the in-flight run instead of letting a
# stale ~8-min run finish (freeing runners + faster feedback). head_ref groups
# a PR's runs; ref covers push events. cancel-in-progress is gated to PRs so
# every push to main completes for the historical record.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install libvips (loaded at Rails boot via active_storage_validations)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libvips42t64

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v6
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.tool-versions', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  lint_docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install libvips (loaded at Rails boot via active_storage_validations)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libvips42t64

      - name: Install pinned lint tools (markdownlint-cli, @herb-tools/linter)
        run: npm ci

      - name: Check markdown
        run: bundle exec rake markdown:check

      - name: Check ERB templates
        run: bundle exec rake erb:check

  test:
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: test
      CI: true
      # Pin workers to the runner's 4 vCPUs (deterministic split + DB count).
      PARALLEL_TEST_PROCESSORS: "4"

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install libvips (Active Storage image variants)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libvips42t64

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Prepare parallel test databases
        # db:prepare per worker (create + schema + seeds), matching the
        # single-database semantics this job had before parallelization.
        run: bundle exec rake "parallel:rake[db:prepare]"

      - name: Set up gem source symlinks for Tailwind
        run: bundle exec rake tailwind:setup_gem_sources

      - name: Compile assets
        run: bin/rails assets:precompile

      - name: Run tests
        # Parallel suite + integrity gates (example-count parity, merged
        # 40% coverage floor) — see bin/parallel-rspec.
        run: bin/parallel-rspec

      - name: Upload test screenshots on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: system-test-screenshots
          path: tmp/capybara/
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  docker_build:
    # Verify the production Dockerfile actually builds. Structural integration
    # specs catch file-content and ordering bugs, but only running an actual
    # `docker build .` catches build-time regressions like the .tool-versions
    # COPY bug from #129 (fixed in #132). See #133 for context.
    #
    # GHA cache (type=gha) keeps subsequent builds at ~30-60s wall clock by
    # reusing the apt-get, bundle install, and asset precompile layers.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build production image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: modelrails_base:ci-${{ github.sha }}
