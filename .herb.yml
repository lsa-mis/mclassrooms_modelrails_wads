version: 0.10.1
files:
  include:
    - "**/*.html.erb"
    - "**/*.turbo_stream.erb"
  exclude:
    - node_modules/**/*
    - vendor/bundle/**/*
    - coverage/**/*

linter:
  enabled: true
  rules:
    html-no-self-closing:
      enabled: false
    # Disabled: Active Storage's default `_blob.html.erb` partial uses
    # `attachment--<%= ... %>` class names as CSS hooks, not Tailwind utilities.
    # The interpolations are not user-controlled and not an XSS risk; this rule
    # misfires on the framework convention. Re-enable if/when we replace the
    # default partial with a custom one that uses whole-class lookups.
    erb-no-interpolated-class-names:
      enabled: false

formatter:
  enabled: true
  indentWidth: 2
  maxLineLength: 80
