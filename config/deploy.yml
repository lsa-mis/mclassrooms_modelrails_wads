# Name of your application. Used to uniquely configure containers.
service: miclassrooms

# Name of the container image. GitHub Container Registry namespaces by org/user,
# so this is <github-org>/<app>; combined with registry.server below it resolves
# to ghcr.io/lsa-mis/miclassrooms.
image: lsa-mis/miclassrooms

# === SQLite single-host constraint ===
# This template defaults to SQLite (with Solid Queue/Cache/Cable in-process).
# SQLite is single-writer and single-host by design — it cannot be shared
# across machines. That shapes everything below:
#   - servers.web runs on exactly one host (max-replicas: 1 enforces this)
#   - The commented `job:` role below is a TRAP for SQLite users; only enable
#     it after migrating to a network-attached database
# When you outgrow SQLite, see the "Graduation checklist" in the env block.

# Deploy to these servers.
servers:
  web:
    hosts:
      # TODO(LSA TS): production server IP. One host only — SQLite is single-host.
      - REPLACE_WITH_PRODUCTION_SERVER_IP
    options:
      # Required for SQLite: ensures Kamal stops the old container BEFORE
      # starting the new one during deploys. Two containers writing to the
      # same SQLite file is corruption territory. Remove only after migrating
      # to a networked database (see Graduation checklist below).
      max-replicas: 1

  # === TRAP for SQLite users ===
  # The job: role below runs a separate `bin/jobs` Solid Queue supervisor.
  # It is intentionally commented out because it CANNOT share a SQLite file
  # across hosts — SQLite is single-host by design. Uncomment ONLY after:
  #   (1) Adding a database accessory (Postgres/MySQL) — see `accessories:` below
  #   (2) Setting DB_HOST in env.clear to point at the accessory
  #   (3) Flipping SOLID_QUEUE_IN_PUMA: false in env.clear
  #
  # job:
  #   hosts:
  #     - 192.168.0.1
  #   cmd: bin/jobs

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
# If used with Cloudflare, set encryption mode in SSL/TLS setting to "Full" to enable CF-to-app encryption.
#
# Using an SSL proxy like this requires turning on config.assume_ssl and config.force_ssl in production.rb!
#
# Don't use this when deploying to multiple web servers (then you have to terminate SSL at your load balancer).
#
# SSL via Let's Encrypt (kamal-proxy). production.rb already sets the paired
# assume_ssl/force_ssl + the /up health-check redirect exclusion (see
# app/docs/developer/deployment.md "SSL configuration"), so enabling this here
# is all that's required.
proxy:
  ssl: true
  # TODO(LSA TS): final production hostname. Must match RAILS_HOST/APP_HOST below
  # and the DNS A record. TLS is issued for exactly this host.
  host: REPLACE_WITH_PRODUCTION_HOSTNAME

# Where you keep your container images.
registry:
  server: ghcr.io

  # The GitHub org/user that owns the ghcr.io/lsa-mis/miclassrooms package and
  # whose PAT (KAMAL_REGISTRY_PASSWORD) authenticates pushes/pulls.
  username: lsa-mis

  # A GitHub PAT with write:packages, supplied by the deployer's shell — see
  # .kamal/secrets. Never a raw token in this file.
  password:
    - KAMAL_REGISTRY_PASSWORD

# Give Solid Queue's in-Puma supervisor enough time to drain in-flight jobs
# during deploy. Kamal's default (30s) is too tight when SOLID_QUEUE_IN_PUMA
# is true — jobs get SIGKILL'd mid-execution. 45s covers typical drain time.
stop_wait_time: 45

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    # SSO (Okta OIDC) client secret + U-M Facilities gateway credentials
    # (Phase 2 sync). Sourced in .kamal/secrets, never raw here.
    - OKTA_CLIENT_SECRET
    - UM_API_CLIENT_ID
    - UM_API_CLIENT_SECRET
  clear:
    # === Solid Queue topology ===
    # Run the Solid Queue Supervisor inside the web server's Puma process.
    # This is the right default for the SQLite/one-box deploy this template
    # ships with. The supervisor + worker share GVL with HTTP requests — fine
    # for low/moderate job volume; problematic at scale.
    #
    # Graduation checklist (when you outgrow this default):
    #   (1) Add a database accessory (uncomment the `accessories:` block at
    #       the bottom of this file — Postgres or MySQL) and migrate data.
    #   (2) Set DB_HOST below to point at the accessory.
    #   (3) Flip SOLID_QUEUE_IN_PUMA to false.
    #   (4) Uncomment the `servers.job:` block above and deploy a separate
    #       bin/jobs supervisor on its own host.
    SOLID_QUEUE_IN_PUMA: true

    # Set number of processes dedicated to Solid Queue (default: 1).
    # Only meaningful when SOLID_QUEUE_IN_PUMA is false (separate `bin/jobs` host).
    # JOB_CONCURRENCY: 3

    # Set number of cores available to the application on each server (default: 1).
    # Note: with SOLID_QUEUE_IN_PUMA=true, only one Puma worker should host the
    # supervisor — confirm puma-plugin-solid_queue's behavior before raising this.
    # WEB_CONCURRENCY: 2

    # Match this to any external database server to configure Active Record correctly
    # Use modelrails_base-db for a db accessory server on same machine via local kamal docker network.
    # DB_HOST: 192.168.0.2

    # Log everything from Rails
    # RAILS_LOG_LEVEL: debug

    # Production host — mailer/absolute URLs (RAILS_HOST) and the seed's
    # owner-setup link (APP_HOST). Same value as proxy.host above.
    # TODO(LSA TS): final production hostname.
    RAILS_HOST: REPLACE_WITH_PRODUCTION_HOSTNAME
    APP_HOST: REPLACE_WITH_PRODUCTION_HOSTNAME

    # === Tenancy preset (MiClassrooms: shared single-workspace, Phase 0 Task 4) ===
    # The real values this fork runs with. See presets-single-tenant.md.
    WORKSPACE_ON_SIGNUP: shared
    TENANCY_WORKSPACE_CREATION: disabled
    TENANCY_SHARED_WORKSPACE_SLUG: miclassrooms
    TENANCY_SHARED_WORKSPACE_NAME: MClassrooms
    TENANCY_SHARED_JOIN_ROLE: viewer
    # Initial Owner the seed creates + mails a password-set link to (db:seed).
    # TODO: real owner address.
    TENANCY_OWNER_EMAIL: REPLACE_WITH_OWNER_EMAIL

    # === Auth preset (MiClassrooms: SSO-only + Google domain allowlist, Phase 0 Task 7) ===
    # See app/lib/auth_config.rb, config/initializers/omniauth.rb.
    AUTH_SSO_ONLY: true
    ALLOWED_GOOGLE_DOMAINS: umich.edu,lsa.umich.edu
    # TODO(LSA TS): U-M Okta org. OKTA_CLIENT_SECRET is in env.secret above.
    OKTA_ISSUER: REPLACE_WITH_OKTA_ISSUER_URL
    OKTA_CLIENT_ID: REPLACE_WITH_OKTA_CLIENT_ID
    # never set TEST_LOGIN_TOKEN in production — it token-gates a
    # non-production-only backdoor (AuthConfig.test_login_enabled? is hardcoded
    # false whenever Rails.env.production?, but the var itself should never be
    # present in a production environment file regardless).

    # === U-M Facilities gateway (Phase 2 nightly sync) ===
    # CLIENT_ID/SECRET are in env.secret above. See app/lib/um_api/.
    # TODO(gateway team): confirm the production base + token URLs.
    UM_API_BASE_URL: https://gw.api.it.umich.edu/um
    UM_API_TOKEN_URL: https://gw.api.it.umich.edu/um/oauth2/token

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# "bin/kamal logs -r job" will tail logs from the first server in the job section.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Use a persistent storage volume for sqlite database files and local Active Storage files.
# Recommended to change this to a mounted volume path that is backed up off server.
volumes:
  - "miclassrooms_storage:/rails/storage"

# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

  # # Build image via remote server (useful for faster amd64 builds on arm64 computers)
  # remote: ssh://docker@docker-builder-server

  # Pass the Ruby version through so the production image always matches the
  # version Bundler enforces via Gemfile.lock. Keep in sync with .tool-versions.
  args:
    RUBY_VERSION: "4.0.6"

  # secrets:
  #   - GITHUB_TOKEN
  #   - RAILS_MASTER_KEY

# Use a different ssh user than root
# ssh:
#   user: app

