en:
  pages:
    home:
      title: "MiClassrooms"
      hero:
        title: "Find your classroom on the Ann Arbor campus"
        subtitle: "MiClassrooms is the University of Michigan's directory of registrar-schedulable classrooms. Search by building or room and see everything you need before you teach or book — seating capacity (including ADA seating), equipment, photos, 360° panoramas, seating charts, floor plans, and scheduling and support contacts."
        cta_primary: "Sign in"
        cta_secondary: "Learn more"
      features:
        title: "Everything you need before class"
        subtitle: "Locally curated presentation details layered onto building and room data synced nightly from the university's official facilities systems."
        capacity:
          title: "Capacity & ADA seating"
          description: "Seating capacity for every room, including ADA-accessible seat counts, so you can confirm a room fits your class before you book it."
        equipment:
          title: "Equipment & characteristics"
          description: "Projectors, whiteboards, video conferencing, and every other room characteristic — searchable and filterable."
        media:
          title: "Photos & 360° panoramas"
          description: "See the room before you arrive: photos, immersive 360° panoramas, and seating charts for every listed classroom."
        floor_plans:
          title: "Floor plans"
          description: "Find your room on its building's floor plan, alongside every other classroom on that floor."
        contacts:
          title: "Scheduling & support contacts"
          description: "Know exactly who to call to schedule a room or get on-site technical support."
        alerts:
          title: "Notes & alerts"
          description: "Admin-posted alerts flag rooms that need special handling — like an onsite technician — before you walk in."
      cta:
        title: "Ready to find a room?"
        subtitle: "Sign in to search and browse the full directory of registrar-schedulable classrooms."
        button: "Sign in"
    about:
      title: "About MiClassrooms"
      hero:
        title: "About MiClassrooms"
        subtitle: "The University of Michigan's classroom directory for the Ann Arbor campus."
      mission:
        title: "What MiClassrooms does"
        description: "MiClassrooms helps U-M faculty, staff, and students find registrar-schedulable classrooms and see everything about a room before they teach or book it — seating capacity (including ADA seating), equipment and characteristics, photos, 360° panoramas, seating charts, floor plans, and scheduling and support contacts. Building and room data sync nightly from the university's official facilities systems, and admins post notes and alerts on top of it. It replaced the legacy LSA Classroom Database and still supports its old links."
      features:
        title: "What's included"
        items:
          - "Seating capacity, including ADA-accessible seat counts"
          - "Equipment and room characteristics, searchable and filterable"
          - "Photos, 360° panoramas, and seating charts"
          - "Floor plans showing every classroom on a floor"
          - "Scheduling and support contacts for every room"
          - "Admin-posted notes and alerts"
          - "Nightly sync with the university's official facilities systems"
      philosophy:
        title: "Who it's for"
        community:
          title: "U-M community"
          description: "Made for U-M faculty, staff, and students — sign in to search and browse the full directory."
        accessibility:
          title: "Built for everyone"
          description: "MiClassrooms meets WCAG 2.2 AAA accessibility standards, including ADA seating counts on every room."
        data:
          title: "Kept up to date"
          description: "Building and room data sync nightly from the university's facilities systems; photos, panoramas, and notes are curated locally."
        legacy:
          title: "Successor to the Classroom Database"
          description: "MiClassrooms replaces the LSA Classroom Database and keeps its legacy links working."
    privacy:
      title: "Privacy Policy"
      intro: "This privacy policy describes how ModelRails handles your information. We are committed to protecting your privacy and being transparent about our practices."
      collection:
        title: "Information we collect"
        items:
          - "Account information (name, email address) when you sign up"
          - "Authentication data (encrypted passwords, OAuth tokens)"
          - "Usage data (workspace activity, project interactions)"
          - "Technical data (IP address, browser type, session information)"
      usage:
        title: "How we use your information"
        items:
          - "To provide and maintain your account"
          - "To authenticate your identity"
          - "To send transactional emails (verification, password reset)"
          - "To track workspace activity for your audit trail"
      sharing:
        title: "Data sharing"
        description: "We do not sell your personal information. We share data only as necessary to provide our services, comply with legal obligations, or protect our rights."
      security:
        title: "Data security"
        description: "We implement industry-standard security measures including encrypted passwords, secure session management, rate-limited authentication, and sensitive data filtering in activity logs."
      rights:
        title: "Your rights"
        items:
          - "Access your personal data"
          - "Correct inaccurate information"
          - "Request deletion of your account"
          - "Export your data"
      contact_text: "For privacy-related inquiries, please visit our"
      contact_link: "contact page"
      updated: "Last updated"
    contact:
      title: "Contact Us"
      hero:
        title: "Get in touch"
        subtitle: "Have questions, feedback, or need help? We're here for you."
      methods:
        title: "Contact methods"
        email:
          title: "Email"
          description: "For general inquiries and support."
          address: "support@modelrails.dev"
        bugs:
          title: "Bug reports"
          description: "Found a bug? Report it on GitHub."
          link_text: "Open an issue"
      community:
        title: "Community"
        github:
          title: "GitHub"
          description: "Browse the source code, contribute, or star the project."
        discussions:
          title: "Discussions"
          description: "Ask questions and share ideas with the community."
        docs:
          title: "Documentation"
          description: "Browse the technical documentation and guides."
